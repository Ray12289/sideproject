<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>潮流商城 | KICKS_NEON | 潮流球鞋電商平台</title>
  <meta name="description" content="瀏覽 KICKS_NEON 完整系列潮流球鞋。提供多重系列、尺碼與價格篩選，輕易尋找屬於您的機能街頭球鞋。">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="subpage">

  <!-- ==========================================
       HEADER & NAVIGATION
       ========================================== -->
  <header>
    <div class="container header-container">
      <a href="index.html" class="logo-wrapper">
        <img class="logo-img" src="assets/images/logo.png" alt="KICKS_NEON Logo">
        <span class="logo-text">KICKS_NEON</span>
      </a>
      
      <nav id="navbar">
        <ul>
          <li><a href="index.html">首頁</a></li>
          <li><a href="about.html">品牌願景</a></li>
          <li><a href="releases.html">發售日曆</a></li>
          <li><a href="shop.html" class="active">潮流商城</a></li>
          <li><a href="contact.html">聯絡我們</a></li>
        </ul>
      </nav>
      
      <div class="header-actions">
        <div class="cart-icon-wrapper" id="cart-icon-btn" aria-label="Open shopping cart">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="cart-count" style="display: none;">0</span>
        </div>
        
        <div class="menu-toggle" id="menu-toggle-btn" aria-label="Toggle Navigation">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
  </header>

  <!-- ==========================================
       SHOP SECTION (商品展示與篩選區)
       ========================================== -->
  <section id="shop" class="shop-section">
    <div class="container">
      <div class="section-header">
        <h1 class="section-title">潮流商城</h1>
        <p class="section-desc">瀏覽我們的完整系列，支援多維度篩選以尋找最適合您的街頭裝備。</p>
      </div>
      
      <div class="shop-container">
        
        <!-- 側邊欄篩選器 -->
        <aside class="sidebar-filter">
          
          <!-- 系列篩選 -->
          <div class="filter-group">
            <h3 class="filter-title">系列 COLLECTION</h3>
            <div class="brand-list">
              <label class="checkbox-container">
                CYBER_EDGE (未來機能)
                <input type="checkbox" value="CYBER_EDGE" class="brand-filter">
                <span class="checkmark"></span>
              </label>
              <label class="checkbox-container">
                NEON_STREET (霓虹街頭)
                <input type="checkbox" value="NEON_STREET" class="brand-filter">
                <span class="checkmark"></span>
              </label>
              <label class="checkbox-container">
                HOLO_SYNTH (全像合成)
                <input type="checkbox" value="HOLO_SYNTH" class="brand-filter">
                <span class="checkmark"></span>
              </label>
              <label class="checkbox-container">
                VOID_TECH (虛空科技)
                <input type="checkbox" value="VOID_TECH" class="brand-filter">
                <span class="checkmark"></span>
              </label>
            </div>
          </div>
          
          <!-- 尺寸篩選 -->
          <div class="filter-group">
            <h3 class="filter-title">尺寸 SIZE (US)</h3>
            <div class="size-grid">
              <button class="size-btn" data-size="7">7</button>
              <button class="size-btn" data-size="8">8</button>
              <button class="size-btn" data-size="9">9</button>
              <button class="size-btn" data-size="10">10</button>
              <button class="size-btn" data-size="11">11</button>
              <button class="size-btn" data-size="12">12</button>
            </div>
          </div>
          
          <!-- 價格篩選 -->
          <div class="filter-group">
            <h3 class="filter-title">價格區間 PRICE</h3>
            <div class="price-range-container">
              <input type="range" id="price-slider" class="range-slider" min="3000" max="10000" step="500" value="10000">
              <div class="price-values">
                <span class="price-value-box">NT$3,000</span>
                <span class="price-value-box" id="price-val">NT$10,000</span>
              </div>
            </div>
          </div>
          
          <!-- 重設按鈕 -->
          <button class="btn-reset-filter"><i class="fa-solid fa-rotate-left"></i> 重設篩選器</button>
        </aside>
        
        <!-- 商品展示區 -->
        <main class="products-layout">
          
          <!-- 工具列 -->
          <div class="shop-toolbar">
            <div class="products-count">
              共顯示 <span id="total-count">0</span> 款球鞋
            </div>
            <div class="shop-sorting">
              <select id="sort-select" aria-label="Sort products">
                <option value="featured">推薦商品 (Featured)</option>
                <option value="price-low">價格：低到高</option>
                <option value="price-high">價格：高到低</option>
              </select>
            </div>
          </div>
          
          <!-- 商品網格 (將由 JS 渲染) -->
          <div class="products-grid" id="products-grid">
            <!-- Loading state or empty -->
          </div>
          
        </main>
        
      </div>
    </div>
  </section>

  <!-- ==========================================
       FOOTER
       ========================================== -->
  <footer>
    <div class="container">
      <div class="footer-logo">KICKS_NEON</div>
      <p class="footer-copy">&copy; 2026 KICKS_NEON Inc. All rights reserved. 潮流球鞋科技電商平台版權所有。</p>
    </div>
  </footer>

  <!-- ==========================================
       SHOPPING CART DRAWER (購物車側欄抽屜)
       ========================================== -->
  <div class="cart-drawer-overlay" id="cart-overlay"></div>
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-drawer-header">
      <h2 class="cart-drawer-title">購物清單 CART</h2>
      <button class="cart-close-btn" id="cart-close-btn" aria-label="Close cart drawer">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    
    <!-- 購物車商品清單 (將由 JS 渲染) -->
    <div class="cart-items-list" id="cart-items-list">
      <!-- Generated dynamically -->
    </div>
    
    <div class="cart-drawer-footer">
      <div class="cart-summary">
        <span class="cart-total-label">總計金額 TOTAL</span>
        <span class="cart-total-value" id="cart-total">NT$0</span>
      </div>
      <button class="btn-cyber btn-cyber-orange" onclick="checkout()">
        確認結帳 CHECKOUT <i class="fa-solid fa-credit-card"></i>
      </button>
    </div>
  </div>

  <!-- Custom JS -->
  <script src="app.js"></script>
</body>
</html>
